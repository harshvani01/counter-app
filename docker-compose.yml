# docker-compose describes the WHOLE app: 3 services, one network, one command.
# Run it with:   docker compose up -d
# Stop it with:  docker compose down
#
# Compose automatically creates a private network and registers each service by
# name, so containers reach each other as "redis", "backend", "frontend" — no
# host.docker.internal, no manual --network flags.

services:
  redis:
    image: redis:7-alpine
    # Persist data to a named volume so the count survives restarts.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: counter
      POSTGRES_DB: counter
      POSTGRES_PASSWORD: counter-demo-pw
    volumes:
      - pg-data:/var/lib/postgresql/data
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.9.0
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@localhost:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_NUM_PARTITIONS: "1"
      KAFKA_LOG_DIRS: "/var/lib/kafka/data"
      CLUSTER_ID: "counter-kraft-cluster1"
    volumes:
      - kafka-data:/var/lib/kafka/data
    restart: unless-stopped

  backend:
    image: ghcr.io/harshvani01/counter-backend:latest
    environment:
      # Reach Redis by its SERVICE NAME on the compose network.
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      # Postgres (durable snapshots) — also reached by service name.
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_DB: counter
      PG_USER: counter
      PG_PASSWORD: counter-demo-pw
      SNAPSHOT_INTERVAL: "5"
      # Kafka event log.
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: counter-events
    depends_on:
      - redis
      - postgres
      - kafka
    restart: unless-stopped

  consumer:
    # Same image as backend, different command: run the Kafka consumer loop.
    image: ghcr.io/harshvani01/counter-backend:latest
    command: ["python", "-m", "app.consumer"]
    environment:
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP: kafka:9092
      KAFKA_TOPIC: counter-events
      KAFKA_GROUP: counter-consumers
      CONSUME_DELAY_MS: "0"
    depends_on:
      - redis
      - kafka
    restart: unless-stopped

  frontend:
    image: ghcr.io/harshvani01/counter-frontend:latest
    ports:
      # Only the frontend is exposed to the outside world (host:container).
      # Backend and Redis are reachable only inside the network — more secure.
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped

# Named volume managed by Docker; keeps Redis data outside the container.
volumes:
  redis-data:
  pg-data:
  kafka-data:
