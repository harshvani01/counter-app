server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: any /api/... request the browser makes to THIS server gets
    # forwarded to the backend. On the docker-compose network, containers reach
    # each other by their SERVICE NAME — so "backend" resolves to the backend
    # container automatically (no host.docker.internal hack, no IPs).
    location /api/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
