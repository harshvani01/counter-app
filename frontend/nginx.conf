server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Reverse proxy: any /api/... request the browser makes to THIS server gets
    # forwarded to the backend container. To the browser, frontend and backend
    # share one origin — no CORS, no hard-coded backend URL in the JS.
    #
    # host.docker.internal = the VM host, reached from inside this container.
    # (In the docker-compose / k8s stages we'll switch this to the service name.)
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # SPA fallback: unknown paths return index.html so client-side routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
