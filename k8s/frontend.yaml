# Frontend: nginx serving React + proxying /api to the "backend" Service.
# 2 replicas, behind a Service that the Ingress routes public traffic to.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: counter-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/harshvani01/counter-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          livenessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: counter-app
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
